name: Security CI

on:
  push:
    branches: ["main", "master", "dev"]
    paths:
      - "src/pages/api/**"
      - "src/lib/security.ts"
      - "scripts/check-csrf-guard.cjs"
  pull_request:
    paths:
      - "src/pages/api/**"
      - "src/lib/security.ts"
      - "scripts/check-csrf-guard.cjs"

jobs:
  csrf-guard:
    name: CSRF same-origin guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check ensureSameOrigin on cookie-auth mutation routes
        run: node scripts/check-csrf-guard.cjs

  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Astro type-check
        run: npx astro check
