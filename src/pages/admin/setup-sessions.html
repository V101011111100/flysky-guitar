<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Sessions Table - FlySky Admin</title>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background: #10b981;
            color: white;
        }
        .error {
            background: #ef4444;
            color: white;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #2563eb;
        }
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f;
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .instructions {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .instructions h3 {
            margin-top: 0;
            color: #495057;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 5px 0;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Cài Đặt Sessions Management</h1>
        
        <div class="instructions">
            <h3>Hướng dẫn cài đặt:</h3>
            <ol>
                <li>Đảm bảo bạn đã đăng nhập với tài khoản admin</li>
                <li>Nhấn nút "Tạo Sessions Table" bên dưới</li>
                <li>Chờ thông báo thành công</li>
                <li>Sau khi cài đặt xong, tính năng "Ghi nhớ đăng nhập" sẽ hoạt động</li>
            </ol>
        </div>

        <div id="status-message"></div>
        
        <button class="btn" onclick="setupSessionsTable()" id="setup-btn">
            <span id="btn-text">🚀 Tạo Sessions Table</span>
        </button>
    </div>

    <script>
        async function setupSessionsTable() {
            const btn = document.getElementById('setup-btn');
            const btnText = document.getElementById('btn-text');
            const statusDiv = document.getElementById('status-message');
            
            // Show loading state
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span> Đang tạo table...';
            
            try {
                const response = await fetch('/api/admin/migrate-sessions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('sb-access-token')
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.innerHTML = `
                        <div class="status success">
                            ✅ ${result.message}<br>
                            <small>Số records hiện tại: ${result.recordCount}</small>
                        </div>
                    `;
                    btnText.textContent = '✅ Hoàn tất cả!';
                    btn.style.background = '#10b981';
                } else {
                    statusDiv.innerHTML = `
                        <div class="status error">
                            ❌ ${result.error}
                        </div>
                    `;
                    btnText.textContent = '🔄 Thử lại';
                    btn.style.background = '#ef4444';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Setup Error:', error);
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Lỗi kết nối: ${error.message}
                    </div>
                `;
                btnText.textContent = '🔄 Thử lại';
                btn.style.background = '#ef4444';
                btn.disabled = false;
            }
        }
        
        // Check if user is logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('sb-access-token');
            if (!token) {
                document.getElementById('status-message').innerHTML = `
                    <div class="status error">
                        ⚠️ Vui lòng đăng nhập vào trang admin trước
                    </div>
                `;
                document.getElementById('setup-btn').disabled = true;
                document.getElementById('btn-text').textContent = '🔒 Yêu cầu đăng nhập';
            }
        });
    </script>
</body>
</html>
